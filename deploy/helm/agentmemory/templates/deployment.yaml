apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentmemory.fullname" . }}
  labels:
    {{- include "agentmemory.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agentmemory.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentmemory.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "agentmemory.serviceAccountName" . }}
      {{- end }}
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 65532:65532 /data && chmod 755 /data"]
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3111
            - name: streams
              containerPort: 3112
          envFrom:
            - secretRef:
                name: {{ include "agentmemory.fullname" . }}-secrets
            - configMapRef:
                name: {{ include "agentmemory.fullname" . }}-config
          {{- with .Values.config.additionalEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: entrypoint
              mountPath: /usr/local/bin/agentmemory-entrypoint.sh
              subPath: entrypoint.sh
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "agentmemory.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: entrypoint
          configMap:
            name: {{ include "agentmemory.fullname" . }}-entrypoint
            defaultMode: 0755
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
