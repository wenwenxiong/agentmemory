replicaCount: 1

image:
  repository: agentmemory
  pullPolicy: IfNotPresent
  tag: "0.9.22"

secrets:
  openaiApiKey: ""
  anthropicApiKey: ""
  geminiApiKey: ""
  openrouterApiKey: ""
  voyageApiKey: ""
  cohereApiKey: ""
  minimaxApiKey: ""
  agentmemorySecret: ""

config:
  embeddingProvider: "openai"
  autoCompress: "true"
  injectContext: "false"
  consolidationEnabled: "false"
  graphExtractionEnabled: "false"
  agentmemoryReflect: "false"
  tokenBudget: "2000"
  maxObsPerSession: "500"
  bm25Weight: "0.4"
  vectorWeight: "0.6"
  graphWeight: "0.2"
  tools: "all"
  additionalEnv: {}

persistence:
  enabled: true
  size: 1Gi
  storageClassName: ""
  accessMode: ReadWriteOnce
  existingClaim: ""

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  port: 3111
  streamsPort: 3112
  annotations: {}

serviceAccount:
  create: false
  name: ""
  annotations: {}

podAnnotations: {}

podSecurityContext:
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false

readinessProbe:
  httpGet:
    path: /agentmemory/livez
    port: 3111
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 6

livenessProbe:
  httpGet:
    path: /agentmemory/livez
    port: 3111
  initialDelaySeconds: 30
  periodSeconds: 30
  failureThreshold: 3

nodeSelector: {}

tolerations: []

affinity: {}

openclaw:
  plugin:
    enabled: true
    tokenBudget: 2000
    minConfidence: 0.5
    fallbackOnError: true
    timeoutMs: 5000
